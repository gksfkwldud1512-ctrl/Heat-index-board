name: 체감온도 데이터 수집

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 실행 (UTC 기준, GitHub 부하에 따라 몇 분 지연될 수 있음)
  workflow_dispatch:            # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collector
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: Air365 데이터 수집 및 Supabase 저장
        run: node poll.js
        env:
          # GitHub 저장소 Settings > Secrets and variables > Actions 에 등록
          AIR365_API_KEY: ${{ secrets.AIR365_API_KEY }}
          AIR365_GROUP_ID: ${{ secrets.AIR365_GROUP_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
